<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Responsive Image Gallery</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        color:#333;
    }

    header{
        text-align:center;
        padding:20px;
        background:#222;
        color:white;
    }

    header h1{
        font-size:2.5rem;
        margin-bottom:10px;
    }

    header p{
        font-size:1rem;
        color:#ccc;
    }

    /* Filter Buttons */
    .filters{
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
        gap:10px;
        margin:20px;
    }

    .filters button{
        padding:10px 20px;
        border:none;
        background:#333;
        color:white;
        cursor:pointer;
        border-radius:5px;
        transition:0.3s;
    }

    .filters button:hover,
    .filters button.active{
        background:#ff9800;
        transform:scale(1.05);
    }

    /* Gallery Layout */
    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
        padding:20px;
        max-width:1200px;
        margin:auto;
    }

    .gallery-item{
        position:relative;
        overflow:hidden;
        border-radius:12px;
        cursor:pointer;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        transition:transform 0.4s ease;
    }

    .gallery-item img{
        width:100%;
        height:250px;
        object-fit:cover;
        transition:transform 0.5s ease, filter 0.5s ease;
    }

    .gallery-item:hover img{
        transform:scale(1.1);
        filter:brightness(70%);
    }

    .gallery-item .overlay{
        position:absolute;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        font-size:1.5rem;
        opacity:0;
        transition:0.5s;
        background:rgba(0,0,0,0.4);
    }

    .gallery-item:hover .overlay{
        opacity:1;
    }

    /* Lightbox */
    .lightbox{
        display:none;
        position:fixed;
        z-index:999;
        left:0;
        top:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        justify-content:center;
        align-items:center;
        flex-direction:column;
    }

    .lightbox img{
        max-width:90%;
        max-height:80%;
        border-radius:10px;
        animation:zoom 0.4s ease;
    }

    @keyframes zoom{
        from{
            transform:scale(0.7);
            opacity:0;
        }
        to{
            transform:scale(1);
            opacity:1;
        }
    }

    .controls{
        margin-top:20px;
    }

    .controls button{
        padding:12px 18px;
        margin:0 10px;
        border:none;
        border-radius:5px;
        background:#ff9800;
        color:white;
        font-size:1rem;
        cursor:pointer;
        transition:0.3s;
    }

    .controls button:hover{
        background:white;
        color:#333;
    }

    .close{
        position:absolute;
        top:20px;
        right:30px;
        font-size:40px;
        color:white;
        cursor:pointer;
    }

    /* Responsive */
    @media(max-width:768px){
        header h1{
            font-size:2rem;
        }

        .gallery-item img{
            height:200px;
        }
    }

    @media(max-width:500px){
        .gallery{
            grid-template-columns:1fr;
        }
    }
</style>
</head>

<body>

<header>
    <h1>Responsive Image Gallery</h1>
    <p>HTML • CSS • JavaScript Project</p>
</header>

<!-- Filter Buttons -->
<div class="filters">
    <button class="active" onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
</div>

<!-- Gallery -->
<div class="gallery">

    <div class="gallery-item nature">
        <img src="https://picsum.photos/id/1015/600/400" alt="">
        <div class="overlay">Nature</div>
    </div>

    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1011/600/400" alt="">
        <div class="overlay">City</div>
    </div>

    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/1025/600/400" alt="">
        <div class="overlay">Animals</div>
    </div>

    <div class="gallery-item nature">
        <img src="https://picsum.photos/id/1039/600/400" alt="">
        <div class="overlay">Nature</div>
    </div>

    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1043/600/400" alt="">
        <div class="overlay">City</div>
    </div>

    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/1062/600/400" alt="">
        <div class="overlay">Animals</div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="">
    
    <div class="controls">
        <button id="prev">Prev</button>
        <button id="next">Next</button>
    </div>
</div>

<script>

    const galleryItems = document.querySelectorAll(".gallery-item img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const closeBtn = document.querySelector(".close");

    let currentIndex = 0;

    // Open Lightbox
    galleryItems.forEach((img, index) => {
        img.addEventListener("click", () => {
            currentIndex = index;
            showImage();
            lightbox.style.display = "flex";
        });
    });

    // Show Current Image
    function showImage(){
        lightboxImg.src = galleryItems[currentIndex].src;
    }

    // Next Image
    document.getElementById("next").addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % galleryItems.length;
        showImage();
    });

    // Previous Image
    document.getElementById("prev").addEventListener("click", () => {
        currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
        showImage();
    });

    // Close Lightbox
    closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
    });

    // Close on Outside Click
    lightbox.addEventListener("click", (e) => {
        if(e.target === lightbox){
            lightbox.style.display = "none";
        }
    });

    // Filter Images
    function filterImages(category){

        const items = document.querySelectorAll(".gallery-item");
        const buttons = document.querySelectorAll(".filters button");

        buttons.forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");

        items.forEach(item => {

            if(category === "all"){
                item.style.display = "block";
            }
            else if(item.classList.contains(category)){
                item.style.display = "block";
            }
            else{
                item.style.display = "none";
            }

        });
    }

</script>

</body>
</html>
